name: Weekly SEO agent

# Reads GSC + GA4 (broad static bundle + on-demand drill-down), runs a 3-pass
# debate (propose -> red-team attack -> impartial judge), and opens a PR with a
# report + any high-confidence metadata edits the debate produced.
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 7 * * 1"   # Mondays 07:00 UTC

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: seo-agent
  cancel-in-progress: false

env:
  GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
  GA4_PROPERTY_ID: ${{ vars.GA4_PROPERTY_ID }}
  GSC_SITE: ${{ vars.GSC_SITE }}
  CF_ANALYTICS_TOKEN: ${{ secrets.CF_ANALYTICS_TOKEN }}
  CF_ZONE_ID: ${{ vars.CF_ZONE_ID }}
  CF_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
  PSI_API_KEY: ${{ secrets.PSI_API_KEY }}
  CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
  # "true" only once the mail secrets are set, so the email step skips cleanly until then
  MAIL_CONFIGURED: ${{ secrets.MAIL_SERVER != '' }}

jobs:
  seo:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: pip install -r scripts/seo-agent/requirements.txt
      - name: Fetch GSC + GA4 data
        env:
          SEO_DATA_OUT: seo-data.json
        run: python scripts/seo-agent/fetch.py
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Claude Code
        run: npm i -g @anthropic-ai/claude-code

      # Pass 1 — propose candidates (no edits)
      - name: Propose (analyst)
        run: |
          PROMPT="$(cat scripts/seo-agent/prompt.md)

          The analytics bundle is at: ./seo-data.json
          Today's date is: $(date +%F)"
          claude -p "$PROMPT" --model opus --effort xhigh --permission-mode acceptEdits \
            --allowedTools "Read,Write,Bash(python scripts/seo-agent/query.py:*),Bash(python3 scripts/seo-agent/query.py:*),Bash(cat:*),Bash(ls:*),Bash(grep:*),Bash(rg:*)"

      # Pass 2 — red-team attacks every candidate (no edits)
      - name: Red-team (attack)
        run: |
          PROMPT="$(cat scripts/seo-agent/prompt-adversary.md)

          The analyst draft is at: ./reports/_draft.md
          The analytics bundle is at: ./seo-data.json
          Today's date is: $(date +%F)"
          claude -p "$PROMPT" --model opus --effort xhigh --permission-mode acceptEdits \
            --allowedTools "Read,Write,Bash(python scripts/seo-agent/query.py:*),Bash(python3 scripts/seo-agent/query.py:*),Bash(cat:*),Bash(ls:*),Bash(grep:*),Bash(rg:*)"

      # Pass 3 — impartial judge decides, finalizes, makes <=2 edits
      - name: Judge & finalize
        run: |
          PROMPT="$(cat scripts/seo-agent/prompt-judge.md)

          The analyst draft is at: ./reports/_draft.md
          The red-team critique is at: ./reports/_critique.md
          The analytics bundle is at: ./seo-data.json
          Today's date is: $(date +%F)"
          claude -p "$PROMPT" --model opus --effort xhigh --permission-mode acceptEdits \
            --allowedTools "Read,Edit,Write,Bash(python scripts/seo-agent/query.py:*),Bash(python3 scripts/seo-agent/query.py:*),Bash(cat:*),Bash(ls:*),Bash(grep:*),Bash(rg:*)"

      - name: Clean up scratch files
        run: rm -f reports/_draft*.md reports/_critique*.md

      # Safety net: if the agent edited code, verify it still builds; auto-revert
      # breaking edits (keep the report) so a bad fix never reaches a PR.
      - name: Verify agent edits build
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: |
          if git status --porcelain app lib | grep -q .; then
            echo "Agent edited code — verifying build..."
            npm ci --no-audit --no-fund
            if ! npm run build; then
              echo "::warning::Agent edits broke the build — reverting code edits, keeping the report."
              git checkout -- app lib
              printf '\n---\n> WARNING: proposed code edits were auto-reverted (they broke the build). The report and suggestions are retained — apply manually after review.\n' >> reports/seo-report.md
            else
              echo "Build OK."
            fi
          else
            echo "No code edits — skipping build verification."
          fi

      # Best-effort PDF of the report to attach to the email (never blocks the email).
      - name: Render report to PDF
        id: pdf
        if: ${{ env.MAIL_CONFIGURED == 'true' }}
        continue-on-error: true
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq pandoc wkhtmltopdf xvfb
          if xvfb-run -a pandoc reports/seo-report.md -o reports/seo-report.pdf \
               --metadata title="nphacks weekly site audit" \
               -V margin-top=16mm -V margin-bottom=16mm -V margin-left=16mm -V margin-right=16mm; then
            echo "path=reports/seo-report.pdf" >> "$GITHUB_OUTPUT"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      # Deliver the report PRIVATELY by email — never in the PR / repo / public artifacts.
      # Body = readable HTML (rendered from the digest); PDF attached when available.
      # Skips cleanly until the MAIL_* secrets are configured.
      - name: Email the report (private)
        if: ${{ env.MAIL_CONFIGURED == 'true' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: nphacks site audit <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_TO }}
          subject: "nphacks — weekly site audit report"
          body: file://reports/seo-report.md
          convert_markdown: true
          attachments: ${{ steps.pdf.outputs.path }}

      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: seo-agent/weekly-report
          delete-branch: true
          # Only commit the agent's legitimate outputs — never .github/ or scripts/
          # (the default GITHUB_TOKEN can't push workflow files, which would fail the run).
          add-paths: |
            app/**
            lib/**
          title: "Weekly site audit — fixes"
          commit-message: "seo: weekly agent fixes"
          body: |
            Automated fixes from the weekly site audit (3-pass debate: propose → red-team → judge).

            These are only the code changes the agent was confident were safe. **The full report
            — analysis, proposed-but-not-applied issues, and site health — is the `seo-report`
            artifact on this workflow run.** Download and read it before merging.
