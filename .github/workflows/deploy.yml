name: Deploy to droplet

# Pushes to main auto-deploy to the DigitalOcean droplet (165.22.207.24).
# The droplet runs /usr/local/bin/deploy-nphacks (git pull + npm ci + build +
# systemctl restart). The deploy SSH key is forced to ONLY run that script, so
# the command sent here is ignored — any string triggers the deploy.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never run two deploys at once; let an in-flight build finish rather than
# killing it half-way.
concurrency:
  group: deploy-droplet
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.DROPLET_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}" deploy
